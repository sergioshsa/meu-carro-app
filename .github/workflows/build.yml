name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes do SDK
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true

      - name: Restaurar e verificar keystore (assinatura fixa)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KS_PASS }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > app/meucarro.keystore
          echo "Keystore restaurado: $(wc -c < app/meucarro.keystore) bytes"
          if [ ! -s app/meucarro.keystore ]; then echo "ERRO: keystore vazio (verifique o segredo KEYSTORE_BASE64)"; exit 1; fi
          keytool -list -keystore app/meucarro.keystore -storepass "$KS_PASS" -alias meucarro >/dev/null \
            && echo "OK: keystore e senha KS_PASS conferem" \
            || { echo "ERRO: senha KS_PASS incorreta ou keystore invalido"; exit 1; }

      - name: Instalar Gradle e compilar o APK
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Gerar APK (debug)
        env:
          KS_PASS: ${{ secrets.KS_PASS }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeuCarro-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Criar Release com o APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: Meu Carro APK (build ${{ github.run_number }})
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
