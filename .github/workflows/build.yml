name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite rodar manualmente pelo botao "Run workflow"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes do SDK
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true

      - name: Instalar Gradle e compilar o APK
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Gerar APK (debug)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeuCarro-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Criar Release com o APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: Meu Carro APK (build ${{ github.run_number }})
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
